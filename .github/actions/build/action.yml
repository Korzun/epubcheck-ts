name: Install, verify, and build
description: Install dependencies, run lint/typecheck/test, and build the package.

inputs:
  node-version:
    description: Node.js version to use.
    required: false
    default: '22'

runs:
  using: composite
  steps:
    # NOTE: do NOT set `registry-url` here. It makes setup-node write an
    # .npmrc with `_authToken=${NODE_AUTH_TOKEN}`; with no token set that empty
    # token shadows OIDC Trusted Publishing in the release workflow (npm skips
    # OIDC when any auth token is configured), causing a masked 404 on publish.
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
    - run: npm ci
      shell: bash
    - run: npm run lint
      shell: bash
    - run: npm run typecheck
      shell: bash
    - run: npm test
      shell: bash
    - run: npm run build
      shell: bash
